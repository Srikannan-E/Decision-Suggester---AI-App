<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Suggester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b14;
      --bg-elevated: #0d1320;
      --surface: #121a2b;
      --border: rgba(148, 163, 184, 0.12);
      --text: #e8edf7;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.15);
      --violet: #a78bfa;
      --danger-bg: rgba(248, 113, 113, 0.1);
      --danger-border: rgba(248, 113, 113, 0.25);
      --radius: 16px;
      --font: "DM Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, rgba(56, 189, 248, 0.08), transparent),
        radial-gradient(800px 400px at 90% 0%, rgba(167, 139, 250, 0.06), transparent),
        var(--bg);
      color: var(--text);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100%;
      max-width: 1280px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      background: rgba(7, 11, 20, 0.6);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sidebar h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 0 0 8px;
      font-weight: 600;
    }
    .history-item {
      text-align: left;
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .history-item:hover {
      background: var(--surface);
      border-color: var(--border);
    }
    .history-item small { display: block; color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(7, 11, 20, 0.4);
    }
    .header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .header p { margin: 4px 0 0; font-size: 0.85rem; color: var(--muted); }
    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #1a2438; border-color: rgba(148, 163, 184, 0.22); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #0369a1, #4f46e5);
      border: none;
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.06); }
    .btn-ghost { background: transparent; }

    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 32px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 720px;
      margin: 0 auto 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .msg-user .msg-avatar { background: var(--accent-dim); border-color: rgba(56, 189, 248, 0.25); }
    .msg-body {
      flex: 1;
      min-width: 0;
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .msg-user .msg-body {
      background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
    }
    .msg-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }

    .composer-wrap {
      position: sticky;
      bottom: 0;
      flex-shrink: 0;
      padding: 4px 10px 10px;
      background: linear-gradient(to top, rgba(7, 11, 20, 0.92) 40%, transparent);
    }
    .composer {
      max-width: 920px;
      margin: 0 auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(13, 19, 32, 0.88);
      backdrop-filter: blur(12px);
      padding: 7px 9px 8px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.22);
    }

    .composer-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 124px minmax(96px, 118px) auto;
      gap: 6px 8px;
      align-items: end;
    }
    @media (max-width: 680px) {
      .composer-top {
        grid-template-columns: 1fr 1fr;
      }
      .field-product { grid-column: 1 / -1; }
      .field-cat { grid-column: 1; }
      .field-budget { grid-column: 2; }
      .field-action {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: flex-end;
        align-items: end;
        gap: 8px;
      }
      .field-action .c-label-phantom { display: none; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .field-question {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }

    .c-label {
      display: block;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin: 0;
      font-weight: 600;
      line-height: 1.2;
    }
    .c-label-phantom {
      visibility: hidden;
      white-space: nowrap;
    }

    .input-compact, .select-compact, .textarea-compact {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(7, 11, 20, 0.55);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.8125rem;
      font-family: inherit;
      line-height: 1.35;
    }
    .textarea-compact {
      min-height: 38px;
      max-height: 120px;
      resize: vertical;
      display: block;
    }
    .input-compact:focus, .select-compact:focus, .textarea-compact:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.45);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.1);
    }

    .btn-inline {
      padding: 7px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 8px;
      white-space: nowrap;
    }

    .composer-busy-hint {
      margin: 6px 0 0;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    .feature-block {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7, 11, 20, 0.45);
    }
    .feature-block h4 {
      margin: 0 0 8px;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .feature-block ul { margin: 0; padding-left: 18px; color: #cbd5e1; font-size: 0.88rem; line-height: 1.5; }
    .feature-block .spec-text { font-size: 0.88rem; line-height: 1.6; color: #cbd5e1; margin: 0; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(148, 163, 184, 0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    .spinner-lg { width: 28px; height: 28px; border-width: 3px; }

    /* Typing dots */
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    /* Skeleton */
    .skel {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(148, 163, 184, 0.08), rgba(148, 163, 184, 0.18), rgba(148, 163, 184, 0.08));
      background-size: 200% 100%;
      animation: skel 1.2s ease-in-out infinite;
      margin-bottom: 10px;
    }
    .skel:last-child { margin-bottom: 0; }
    @keyframes skel { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .skel.w-90 { width: 90%; }
    .skel.w-70 { width: 70%; }
    .skel.w-50 { width: 50%; }

    .error-banner {
      max-width: 720px;
      margin: 0 auto 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: #fecaca;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .verdict-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .verdict-pill {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .verdict-BUY { background: rgba(34, 197, 94, 0.18); color: #86efac; }
    .verdict-DONT_BUY { background: rgba(248, 113, 113, 0.18); color: #fecaca; }
    .verdict-MAYBE { background: rgba(250, 204, 21, 0.15); color: #fde047; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin: 14px 0;
    }
    .stat {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(7, 11, 20, 0.5);
      border: 1px solid var(--border);
    }
    .stat label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat .val { font-size: 1rem; font-weight: 650; margin-top: 4px; font-family: var(--mono); }
    .budget-ok { color: #86efac; }
    .budget-warn { color: #fde047; }
    .budget-bad { color: #fecaca; }

    .procon {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    @media (max-width: 560px) { .procon { grid-template-columns: 1fr; } }
    .procon h4 { margin: 0 0 8px; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .procon ul { margin: 0; padding-left: 18px; color: #cbd5e1; font-size: 0.9rem; line-height: 1.5; }

    .reasoning {
      margin-top: 12px;
      font-size: 0.92rem;
      line-height: 1.65;
      color: #cbd5e1;
    }
    .summary-box {
      margin-top: 10px;
      padding: 12px;
      border-left: 3px solid var(--violet);
      background: rgba(167, 139, 250, 0.06);
      border-radius: 0 10px 10px 0;
      font-size: 0.92rem;
      color: #e2e8f0;
    }

    .empty-state {
      max-width: 480px;
      margin: 48px auto;
      text-align: center;
      color: var(--muted);
    }
    .empty-state strong { color: var(--text); display: block; margin-bottom: 8px; font-size: 1.05rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    function Spinner({ large }) {
      return <span className={large ? "spinner spinner-lg" : "spinner"} role="status" aria-label="Loading" />;
    }

    function TypingIndicator() {
      return (
        <div className="typing" aria-live="polite">
          <span />
          <span />
          <span />
        </div>
      );
    }

    function SkeletonAssistant() {
      return (
        <div>
          <div className="skel w-90" />
          <div className="skel w-70" />
          <div className="skel w-50" />
        </div>
      );
    }

    function ErrorBanner({ message, onDismiss }) {
      if (!message) return null;
      return (
        <div className="error-banner">
          <span>{message}</span>
          <button type="button" className="btn btn-ghost" onClick={onDismiss}>Dismiss</button>
        </div>
      );
    }

    function parseBudgetNumber(budgetStr) {
      if (!budgetStr || !budgetStr.trim()) return null;
      const digits = budgetStr.replace(/[^0-9.]/g, "").replace(/^\.+|\.+$/g, "");
      if (!digits) return null;
      const n = parseFloat(digits);
      return Number.isFinite(n) ? n : null;
    }

    const inrFormatter = new Intl.NumberFormat("en-IN", {
      style: "currency",
      currency: "INR",
      maximumFractionDigits: 0,
    });

    function formatInr(amount) {
      if (amount == null || !Number.isFinite(Number(amount))) return "—";
      return inrFormatter.format(Math.round(Number(amount)));
    }

    function budgetClass(price, budgetNum) {
      if (budgetNum == null || price == null) return "";
      if (price <= budgetNum) return "budget-ok";
      if (price <= budgetNum * 1.1) return "budget-warn";
      return "budget-bad";
    }

    function DecisionCard({ data, budgetStr }) {
      const budgetNum = parseBudgetNumber(budgetStr);
      const price = data.price != null ? Number(data.price) : null;
      const v = (data.verdict || "MAYBE").replace(/\s/g, "_");
      const pillClass = "verdict-pill verdict-" + (v === "DONT_BUY" ? "DONT_BUY" : v === "BUY" ? "BUY" : "MAYBE");

      return (
        <div>
          <div className="verdict-row">
            <span className={pillClass}>{data.verdict || "PENDING"}</span>
            {data.confidenceScore != null && (
              <span style={{ color: "var(--muted)", fontSize: "0.85rem" }}>
                Confidence {(Number(data.confidenceScore) * 100).toFixed(0)}%
              </span>
            )}
          </div>

          <div className="stat-grid">
            <div className="stat">
              <label>Product</label>
              <div className="val" style={{ fontSize: "0.85rem", wordBreak: "break-word" }}>{data.productName || "—"}</div>
            </div>
            <div className="stat">
              <label>Indicative price (INR)</label>
              <div className={"val " + budgetClass(price, budgetNum)}>
                {price != null ? formatInr(price) : "—"}
              </div>
            </div>
            <div className="stat">
              <label>Rating</label>
              <div className="val">{data.rating != null ? data.rating + "/5" : "—"}</div>
            </div>
            <div className="stat">
              <label>Your budget</label>
              <div className="val">{budgetStr?.trim() ? budgetStr : "—"}</div>
            </div>
          </div>

          {data.specSummary && (
            <div className="feature-block">
              <h4>Model notes</h4>
              <p className="spec-text">{data.specSummary}</p>
            </div>
          )}

          {data.featureHighlights?.length > 0 && (
            <div className="feature-block">
              <h4>Typical features &amp; details</h4>
              <ul>{data.featureHighlights.map((f, i) => <li key={i}>{f}</li>)}</ul>
            </div>
          )}

          {data.summary && (
            <div className="summary-box">{data.summary}</div>
          )}

          {data.reasoning && <p className="reasoning">{data.reasoning}</p>}

          <div className="procon">
            <div>
              <h4>Pros</h4>
              {data.pros?.length ? (
                <ul>{data.pros.map((p, i) => <li key={i}>{p}</li>)}</ul>
              ) : (
                <p style={{ color: "var(--muted)", margin: 0, fontSize: "0.88rem" }}>None listed</p>
              )}
            </div>
            <div>
              <h4>Cons</h4>
              {data.cons?.length ? (
                <ul>{data.cons.map((c, i) => <li key={i}>{c}</li>)}</ul>
              ) : (
                <p style={{ color: "var(--muted)", margin: 0, fontSize: "0.88rem" }}>None listed</p>
              )}
            </div>
          </div>

          {data.processingTimeMs != null && (
            <p style={{ marginTop: 14, fontSize: "0.75rem", color: "var(--muted)" }}>
              Processed in {data.processingTimeMs} ms · ID {data.id}
            </p>
          )}
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([]);
      const [product, setProduct] = useState("");
      const [category, setCategory] = useState("electronics");
      const [budget, setBudget] = useState("");
      const [userQuestion, setUserQuestion] = useState("");
      const [error, setError] = useState("");
      const [busy, setBusy] = useState(false);
      const [history, setHistory] = useState([]);
      const [historyLoading, setHistoryLoading] = useState(false);
      const bottomRef = useRef(null);
      const pollRef = useRef(null);

      const scrollToBottom = () => {
        requestAnimationFrame(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }));
      };

      useEffect(() => { scrollToBottom(); }, [messages]);

      const loadHistory = useCallback(async () => {
        setHistoryLoading(true);
        try {
          const res = await fetch("/api/decisions?page=0&size=20");
          if (!res.ok) throw new Error("Could not load history");
          const data = await res.json();
          setHistory(data.decisions || []);
        } catch (e) {
          console.warn(e);
        } finally {
          setHistoryLoading(false);
        }
      }, []);

      useEffect(() => { loadHistory(); }, [loadHistory]);

      const stopPolling = () => {
        if (pollRef.current) {
          clearInterval(pollRef.current);
          pollRef.current = null;
        }
      };

      useEffect(() => () => stopPolling(), []);

      const updateAssistantMessage = (assistantId, patch) => {
        setMessages((prev) =>
          prev.map((m) => (m.id === assistantId ? { ...m, ...patch } : m))
        );
      };

      const runDecision = async () => {
        const p = product.trim();
        const c = category.trim();
        if (!p || !c) {
          setError("Add a product name and category.");
          return;
        }
        setError("");
        setBusy(true);

        const userText =
          `**Product:** ${p}\n**Category:** ${c}` +
          (budget.trim() ? `\n**Budget:** ${budget.trim()}` : "") +
          (userQuestion.trim() ? `\n**Ask:** ${userQuestion.trim()}` : "");

        const userId = crypto.randomUUID();
        const assistantId = crypto.randomUUID();

        setMessages((prev) => [
          ...prev,
          { id: userId, role: "user", content: userText },
          { id: assistantId, role: "assistant", loading: true, content: "" },
        ]);

        try {
          const res = await fetch("/api/decisions", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              input: p,
              category: c,
              budget: budget.trim() || null,
              userQuestion: userQuestion.trim() || null,
            }),
          });
          if (!res.ok) {
            let msg = "Request failed";
            try {
              const errBody = await res.json();
              if (errBody.details) msg = errBody.details.join("; ");
              else if (errBody.message) msg = errBody.message;
            } catch {
              const t = await res.text();
              if (t) msg = t;
            }
            throw new Error(msg);
          }
          const submitted = await res.json();
          const id = submitted.id;

          const pollOnce = async () => {
            const r = await fetch("/api/decisions/" + id);
            if (!r.ok) throw new Error("Could not read decision status");
            return r.json();
          };

          const isReady = (data) =>
            data.status === "COMPLETED" ||
            data.status === "FAILED" ||
            (data.verdict != null && data.verdict !== "");

          const finalize = (data) => {
            stopPolling();
            if (data.status === "FAILED") {
              updateAssistantMessage(assistantId, {
                loading: false,
                content: data.errorMessage || "Decision failed.",
                failed: true,
              });
            } else {
              updateAssistantMessage(assistantId, {
                loading: false,
                content: "Here is your recommendation.",
                decision: data,
                budgetStr: budget,
              });
            }
            setBusy(false);
            loadHistory();
          };

          let data = await pollOnce();
          if (isReady(data)) {
            finalize(data);
            return;
          }

          let pollAttempts = 0;
          const maxPollAttempts = 45;

          pollRef.current = setInterval(async () => {
            try {
              pollAttempts += 1;
              data = await pollOnce();
              if (isReady(data)) {
                finalize(data);
                return;
              }
              if (pollAttempts >= maxPollAttempts) {
                stopPolling();
                setBusy(false);
                updateAssistantMessage(assistantId, {
                  loading: false,
                  content: "Decision is taking longer than expected. Check Recent decisions or try again.",
                  failed: true,
                });
              }
            } catch (e) {
              stopPolling();
              setBusy(false);
              updateAssistantMessage(assistantId, {
                loading: false,
                content: e.message || "Polling error",
                failed: true,
              });
            }
          }, 2200);
        } catch (e) {
          setBusy(false);
          setError(e.message || "Something went wrong");
          setMessages((prev) =>
            prev.map((m) =>
              m.id === assistantId
                ? { ...m, loading: false, content: "Could not complete the request.", failed: true }
                : m
            )
          );
        }
      };

      const openHistoryItem = async (id) => {
        setError("");
        try {
          const res = await fetch("/api/decisions/" + id);
          if (!res.ok) throw new Error("Not found");
          const data = await res.json();
          const assistantId = crypto.randomUUID();
          setMessages((prev) => [
            ...prev,
            {
              id: assistantId,
              role: "assistant",
              loading: false,
              content: "Loaded from history.",
              decision: data,
              budgetStr: "",
            },
          ]);
        } catch (e) {
          setError(e.message);
        }
      };

      const newChat = () => {
        stopPolling();
        setMessages([]);
        setError("");
        setBusy(false);
      };

      return (
        <div className="app-shell">
          <aside className="sidebar">
            <h2>Recent decisions</h2>
            {historyLoading ? (
              <div style={{ padding: 12, color: "var(--muted)" }}><Spinner /> Loading…</div>
            ) : history.length === 0 ? (
              <p style={{ color: "var(--muted)", fontSize: "0.88rem", margin: 0 }}>No history yet.</p>
            ) : (
              history.map((h) => (
                <button
                  key={h.id}
                  type="button"
                  className="history-item"
                  onClick={() => openHistoryItem(h.id)}
                >
                  {h.productName || "In progress"}
                  <small>{h.status} · {h.verdict || "—"}</small>
                </button>
              ))
            )}
            <div style={{ marginTop: "auto" }}>
              <button type="button" className="btn" style={{ width: "100%" }} onClick={loadHistory}>
                Refresh list
              </button>
            </div>
          </aside>

          <div className="main">
            <header className="header">
              <div>
                <h1>Decision-Suggester</h1>
                <p>Ask for a buy / skip take on a product, your budget in INR, and review-style signals (indicative India pricing in the simulator).</p>
              </div>
              <div className="header-actions">
                <button type="button" className="btn btn-ghost" onClick={newChat}>New chat</button>
              </div>
            </header>

            <div className="chat-scroll">
              <ErrorBanner message={error} onDismiss={() => setError("")} />

              {messages.length === 0 && (
                <div className="empty-state">
                  <strong>Start a conversation</strong>
                  Describe what you are shopping for. The app runs your request through the decision pipeline
                  (simulated catalog data today) and returns a structured verdict with pros and cons.
                </div>
              )}

              {messages.map((m) => (
                <div key={m.id} className={"msg " + (m.role === "user" ? "msg-user" : "")}>
                  <div className="msg-avatar">{m.role === "user" ? "You" : "AI"}</div>
                  <div className="msg-body">
                    <div className="msg-meta">{m.role === "user" ? "Your request" : "Suggestions"}</div>
                    {m.role === "user" && (
                      <div style={{ whiteSpace: "pre-wrap", fontSize: "0.95rem", lineHeight: 1.55 }}>{m.content}</div>
                    )}
                    {m.role === "assistant" && m.loading && (
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                          <Spinner />
                          <span style={{ color: "var(--muted)" }}>Analyzing product signals…</span>
                          <TypingIndicator />
                        </div>
                        <SkeletonAssistant />
                      </div>
                    )}
                    {m.role === "assistant" && !m.loading && m.failed && (
                      <p style={{ color: "#fecaca", margin: 0 }}>{m.content}</p>
                    )}
                    {m.role === "assistant" && !m.loading && m.decision && (
                      <DecisionCard data={m.decision} budgetStr={m.budgetStr} />
                    )}
                    {m.role === "assistant" && !m.loading && !m.failed && !m.decision && m.content && !m.loading && (
                      <p style={{ margin: 0, color: "var(--muted)" }}>{m.content}</p>
                    )}
                  </div>
                </div>
              ))}
              <div ref={bottomRef} />
            </div>

            <div className="composer-wrap">
              <div className="composer">
                <div className="composer-top">
                  <div className="field field-product">
                    <label className="c-label" htmlFor="inp-product">Product</label>
                    <input
                      id="inp-product"
                      className="input-compact"
                      value={product}
                      onChange={(e) => setProduct(e.target.value)}
                      placeholder="Model name, e.g. POCO M4 5G"
                      disabled={busy}
                      autoComplete="off"
                    />
                  </div>
                  <div className="field field-cat">
                    <label className="c-label" htmlFor="inp-category">Category</label>
                    <select id="inp-category" className="select-compact" value={category} onChange={(e) => setCategory(e.target.value)} disabled={busy}>
                      <option value="electronics">Electronics</option>
                      <option value="home">Home &amp; kitchen</option>
                      <option value="fitness">Fitness</option>
                      <option value="fashion">Fashion</option>
                      <option value="books">Books</option>
                      <option value="general">General</option>
                    </select>
                  </div>
                  <div className="field field-budget">
                    <label className="c-label" htmlFor="inp-budget">Budget (₹)</label>
                    <input
                      id="inp-budget"
                      className="input-compact"
                      value={budget}
                      onChange={(e) => setBudget(e.target.value)}
                      placeholder="20000"
                      disabled={busy}
                      inputMode="decimal"
                    />
                  </div>
                  <div className="field field-action">
                    <span className="c-label c-label-phantom" aria-hidden="true">Go</span>
                    <button type="button" className="btn btn-primary btn-inline" onClick={runDecision} disabled={busy}>
                      {busy ? <><Spinner /> Run…</> : "Recommend"}
                    </button>
                  </div>
                </div>
                <div className="field field-question">
                  <label className="c-label" htmlFor="inp-question">Question (optional)</label>
                  <textarea
                    id="inp-question"
                    className="textarea-compact"
                    rows={2}
                    value={userQuestion}
                    onChange={(e) => setUserQuestion(e.target.value)}
                    placeholder="Camera quality, battery, reviews…"
                    disabled={busy}
                  />
                </div>
                {busy && (
                  <p className="composer-busy-hint" aria-live="polite">Working on your request…</p>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
