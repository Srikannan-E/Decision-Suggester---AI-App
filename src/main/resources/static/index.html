<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Copilot</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    .page { max-width: 960px; margin: 0 auto; padding: 24px; }
    .card { background: rgba(15, 23, 42, .92); border: 1px solid rgba(148, 163, 184, .12); border-radius: 20px; box-shadow: 0 24px 80px rgba(15, 23, 42, .35); padding: 28px; }
    h1 { margin: 0 0 12px; font-size: 2.2rem; letter-spacing: -0.04em; }
    p.lead { color: #94a3b8; margin: 0 0 24px; line-height:1.65; }
    label { display: block; margin: 16px 0 8px; font-size: .95rem; color: #cbd5e1; }
    input, textarea, select { width: 100%; border: 1px solid rgba(148, 163, 184, .18); background: rgba(15,23,42,.7); color: #e2e8f0; border-radius: 12px; padding: 14px 16px; font-size: 1rem; }
    textarea { min-height: 120px; resize: vertical; }
    button { border: none; border-radius: 14px; cursor: pointer; font-weight: 600; padding: 14px 20px; margin-top: 16px; background: linear-gradient(135deg,#7c3aed,#2563eb); color: white; transition: transform .2s ease, box-shadow .2s ease; }
    button:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(56, 189, 248, .18); }
    .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); }
    .badge { display: inline-flex; gap: 8px; align-items: center; padding: 6px 12px; border-radius: 999px; background: rgba(59, 130, 246, .12); color: #bfdbfe; font-size:.88rem; }
    .panel { background: rgba(15, 23, 42, .84); border: 1px solid rgba(148, 163, 184, .12); border-radius: 18px; padding: 20px; }
    .panel h2 { margin-top: 0; font-size: 1.2rem; }
    .result-row { display: grid; gap: 8px; grid-template-columns: 1fr auto; margin: 12px 0; }
    .result-label { color: #94a3b8; font-size:.95rem; }
    .result-value { color: #f8fafc; font-weight: 600; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(148, 163, 184, .35); border-top-color: #60a5fa; border-radius: 999px; animation: spin 0.9s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .list { padding-left: 20px; margin: 8px 0; }
    .error { color: #fecaca; background: rgba(248, 113, 113, .12); border: 1px solid rgba(248, 113, 113, .2); border-radius: 14px; padding: 14px; margin-top: 18px; }
    .footer { margin-top: 28px; font-size:.95rem; color:#94a3b8; }
  </style>
</head>
<body>
  <div id="root" class="page"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [input, setInput] = useState('Wireless headphones');
      const [category, setCategory] = useState('electronics');
      const [decisionId, setDecisionId] = useState(null);
      const [status, setStatus] = useState('');
      const [response, setResponse] = useState(null);
      const [loading, setLoading] = useState(false);
      const [polling, setPolling] = useState(false);
      const [error, setError] = useState('');
      const [lastUpdated, setLastUpdated] = useState(null);
      const pollRef = useRef(null);

      useEffect(() => {
        if (!decisionId) return;

        const pollDecision = async () => {
          try {
            const res = await fetch(`/api/decisions/${decisionId}`);
            if (!res.ok) throw new Error('Unable to fetch decision');
            const data = await res.json();
            setResponse(data);
            setStatus(data.status || 'PENDING');
            setLastUpdated(new Date().toLocaleTimeString());
            if (data.status === 'PENDING' || data.status === 'PROCESSING') return;
            clearInterval(pollRef.current);
            pollRef.current = null;
            setPolling(false);
          } catch (err) {
            setError(err.message || 'Unexpected error polling decision');
            clearInterval(pollRef.current);
            pollRef.current = null;
            setPolling(false);
          }
        };

        if (!pollRef.current) {
          pollDecision();
          pollRef.current = setInterval(pollDecision, 2500);
          setPolling(true);
        }

        return () => {
          if (pollRef.current) {
            clearInterval(pollRef.current);
            pollRef.current = null;
            setPolling(false);
          }
        };
      }, [decisionId]);

      const submitDecision = async () => {
        setError('');
        setResponse(null);
        setLoading(true);
        try {
          const res = await fetch('/api/decisions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ input, category })
          });
          if (!res.ok) {
            const body = await res.text();
            throw new Error(body || 'Failed to submit decision');
          }
          const result = await res.json();
          setDecisionId(result.id);
          setStatus(result.status || 'PENDING');
          setLastUpdated(null);
          setLoading(false);
        } catch (err) {
          setError(err.message || 'Submission failed');
          setLoading(false);
        }
      };

      const refreshDecision = async () => {
        if (!decisionId) return;
        try {
          setError('');
          const res = await fetch(`/api/decisions/${decisionId}`);
          if (!res.ok) throw new Error('Unable to fetch decision');
          const data = await res.json();
          setResponse(data);
          setStatus(data.status || 'PENDING');
        } catch (err) {
          setError(err.message || 'Unexpected error');
        }
      };

      const renderResult = () => {
        const currentStatus = response?.status || status || 'PENDING';
        const waiting = !response || currentStatus === 'PENDING' || currentStatus === 'PROCESSING';

        if (waiting) {
          return (
            <div className="panel">
              <h2>{response ? 'Processing decision' : 'Waiting for decision'}</h2>
              <p className="lead">Submit your product details and the app will analyze the best recommendation. Results appear here once processing completes.</p>
              <div className="result-row" style={{ marginTop: '20px' }}>
                <span className="result-label">Current status</span>
                <span className="result-value">{currentStatus}</span>
              </div>
              <div className="result-row">
                <span className="result-label">Progress</span>
                <span className="result-value">
                  {polling ? React.createElement('span', { className: 'spinner' }) : null}
                  {polling ? 'Waiting for response...' : 'Starting request...'}
                </span>
              </div>
              {lastUpdated ? (
                <div className="result-row">
                  <span className="result-label">Last updated</span>
                  <span className="result-value">{lastUpdated}</span>
                </div>
              ) : null}
            </div>
          );
        }

        return (
          <div className="panel">
            <div className="grid">
              <div>
                <h2>Decision summary</h2>
                <div className="result-row"><span className="result-label">Status</span><span className="result-value">{response.status}</span></div>
                <div className="result-row"><span className="result-label">Verdict</span><span className="result-value">{response.verdict || '-'}</span></div>
                <div className="result-row"><span className="result-label">Confidence</span><span className="result-value">{response.confidenceScore ?? '-'}</span></div>
                <div className="result-row"><span className="result-label">Processed</span><span className="result-value">{response.processingTimeMs != null ? `${response.processingTimeMs} ms` : '-'}</span></div>
              </div>
              <div>
                <h2>Product details</h2>
                <div className="result-row"><span className="result-label">Name</span><span className="result-value">{response.productName || '-'}</span></div>
                <div className="result-row"><span className="result-label">Price</span><span className="result-value">{response.price != null ? `$${response.price}` : '-'}</span></div>
                <div className="result-row"><span className="result-label">Rating</span><span className="result-value">{response.rating != null ? `${response.rating}/5` : '-'}</span></div>
              </div>
            </div>

            <div style={{ marginTop: '24px' }}>
              <h2>Reasoning</h2>
              <p style={{ lineHeight: 1.75, color: '#cbd5e1' }}>{response.reasoning || 'No reasoning available yet.'}</p>
            </div>

            <div style={{ marginTop: '24px' }}>
              <div className="grid">
                <div>
                  <h2>Pros</h2>
                  {response.pros?.length ? <ul className="list">{response.pros.map((item, index) => <li key={index}>{item}</li>)}</ul> : <p className="result-label">None</p>}
                </div>
                <div>
                  <h2>Cons</h2>
                  {response.cons?.length ? <ul className="list">{response.cons.map((item, index) => <li key={index}>{item}</li>)}</ul> : <p className="result-label">None</p>}
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        React.createElement('div', null,
          React.createElement('div', { className: 'card' },
            React.createElement('h1', null, 'Decision Copilot'),
            React.createElement('p', { className: 'lead' }, 'Describe the product and category, then get a recommendation powered by your API.'),
            React.createElement('label', null, 'Product / search query'),
            React.createElement('textarea', {
              value: input,
              onChange: e => setInput(e.target.value),
              placeholder: 'Example: compact noise cancelling headphones for travel'
            }),
            React.createElement('label', null, 'Category'),
            React.createElement('input', {
              value: category,
              onChange: e => setCategory(e.target.value),
              placeholder: 'electronics'
            }),
            React.createElement('div', { style: { display: 'flex', gap: '12px', flexWrap: 'wrap' } },
              React.createElement('button', { onClick: submitDecision, disabled: loading }, loading ? 'Submitting...' : 'Get Recommendation'),
              decisionId && React.createElement('button', { onClick: refreshDecision, style: { background: 'rgba(255,255,255,0.08)', color: '#f8fafc' } }, 'Refresh status')
            ),
            decisionId && React.createElement('div', { className: 'badge', style: { marginTop: '16px' } },
              React.createElement('span', null, 'Decision ID:'),
              React.createElement('strong', null, decisionId)
            ),
            error && React.createElement('div', { className: 'error' }, error)
          ),
          React.createElement('div', { className: 'card', style: { marginTop: '20px' } }, renderResult()),
          React.createElement('div', { className: 'footer' }, 'Railway-ready React UI connected to ', React.createElement('strong', null, '/api/decisions'), '.')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
