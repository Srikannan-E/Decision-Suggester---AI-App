spring:
  application:
    name: decision-copilot

  # ADDED: Gemini AI Configuration
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model-name: gemini-2.5-flash
    timeout-ms: 30000
    max-retries: 2
    enable-caching: true
    cache-ttl-minutes: 60

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  sql:
    init:
      mode: never

  cache:
    type: simple

  # FIXED: Keep AI config but it's OPTIONAL and won't block
  # If you want to enable real AI in future, just set enabled: true
  # and provide GEMINI_API_KEY environment variable
  ai:
    openai:
      api-key: ${GEMINI_API_KEY:default-key-not-used}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.5-flash
          temperature: 0.7

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      llmService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        recordExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.web.client.HttpServerErrorException
  
  retry:
    instances:
      llmService:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException

  ratelimiter:
    instances:
      decisionApi:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers,ratelimiters
  health:
    circuitbreakers:
      enabled: true